<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — Madni Electronics | Jhang</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2563eb;
      --secondary: #f59e0b;
      --bg-dark: #080b12;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-dark);
      color: #eee;
      overflow-x: hidden;
    }
    body::-webkit-scrollbar { width: 6px; }
    body::-webkit-scrollbar-track { background: var(--bg-dark); }
    body::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    .menu-header {
      text-align: center;
      padding: 3rem 5% 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .menu-header h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      color: #fff;
    }
    .menu-header h1 span {
      background: linear-gradient(135deg, var(--primary), #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .menu-header p {
      color: rgba(255,255,255,0.4);
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 0.85rem;
      margin-top: 1rem;
      transition: 0.3s;
    }
    .back-link:hover { color: #fff; }

    .menu-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      padding: 1.5rem 5%;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,11,18,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .menu-tab {
      padding: 0.5rem 1.2rem;
      border: 1px solid rgba(37, 99, 235, 0.2);
      background: rgba(255,255,255,0.02);
      color: rgba(255,255,255,0.5);
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    .menu-tab:hover {
      border-color: rgba(37, 99, 235, 0.4);
      color: #fff;
    }
    .menu-tab.active {
      background: linear-gradient(135deg, var(--primary), #3b82f6);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 0 25px rgba(37, 99, 235, 0.2);
    }

    .menu-section {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 5% 4rem;
    }
    .menu-category {
      display: none;
    }
    .menu-category.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .cat-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid rgba(37, 99, 235, 0.15);
    }
    .cat-header h2 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .cat-header span { font-size: 1.3rem; }
    .cat-header .count {
      margin-left: auto;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
    }

    .menu-item {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      padding: 0.7rem 1rem;
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
      border-left: 2px solid transparent;
      transition: all 0.3s ease;
      margin-bottom: 0.5rem;
    }
    .menu-item:hover {
      background: rgba(37, 99, 235, 0.05);
      border-left-color: var(--primary);
    }
    .menu-item .name { flex: 1; font-weight: 500; font-size: 0.9rem; color: #ddd; }
    .menu-item .dots {
      flex: 1;
      min-width: 20px;
      margin: 0 0.8rem;
      border-bottom: 1px dotted rgba(255,255,255,0.1);
    }
    .menu-item .price { font-weight: 700; color: var(--primary); font-size: 0.9rem; white-space: nowrap; }
    .menu-item .desc { width: 100%; font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-top: 0.3rem; }

    .menu-footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .menu-footer a {
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 0.85rem;
      transition: 0.3s;
    }
    .menu-footer a:hover { color: #fff; }
  </style>
</head>
<body>

<div class="menu-header">
  <h1>Our <span>Products</span></h1>
  <p>Quality electronics — fair prices, trusted service</p>
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
</div>

<div class="menu-tabs" id="menuTabs">
  <button class="menu-tab active" data-cat="appliances">📺 Home Appliances</button>
  <button class="menu-tab" data-cat="mobile">📱 Mobile Accessories</button>
  <button class="menu-tab" data-cat="electrical">🔌 Electrical Items</button>
  <button class="menu-tab" data-cat="computer">💻 Computer Accessories</button>
  <button class="menu-tab" data-cat="cooling">🌀 Cooling & Heating</button>
  <button class="menu-tab" data-cat="repair">🔧 Repair Services</button>
</div>

<div class="menu-section" id="menuSection"></div>

<div class="menu-footer">
  <a href="index.html">← Back to Madni Electronics</a>
</div>

<script>
  const menuData = {
    appliances: { icon: '📺', name: 'Home Appliances', items: [
      ['LED TV 32 Inch', 'Rs 32,000'], ['LED TV 43 Inch', 'Rs 55,000'], ['LED TV 55 Inch', 'Rs 85,000'], ['Electric Iron', 'Rs 1,500'], ['Steam Iron', 'Rs 2,500'], ['Microwave Oven', 'Rs 18,000'], ['Electric Kettle', 'Rs 1,800'], ['Toaster', 'Rs 3,000'], ['Blender/Juicer', 'Rs 4,500'], ['Vacuum Cleaner', 'Rs 12,000'], ['Rice Cooker', 'Rs 5,500'], ['Electric Heater', 'Rs 6,000']
    ]},
    mobile: { icon: '📱', name: 'Mobile Accessories', items: [
      ['Mobile Charger (Original)', 'Rs 500'], ['Fast Charger', 'Rs 1,200'], ['Wireless Charger', 'Rs 2,500'], ['Bluetooth Earphones', 'Rs 1,800'], ['Wired Earphones', 'Rs 400'], ['Power Bank 10,000mAh', 'Rs 2,500'], ['Power Bank 20,000mAh', 'Rs 4,500'], ['Mobile Cover (Simple)', 'Rs 250'], ['Mobile Cover (Premium)', 'Rs 800'], ['Screen Guard (Tempered)', 'Rs 300'], ['USB Data Cable', 'Rs 200'], ['Selfie Stick', 'Rs 600'], ['Mobile Stand', 'Rs 500'], ['Car Mobile Holder', 'Rs 800']
    ]},
    electrical: { icon: '🔌', name: 'Electrical Items', items: [
      ['Switches (Pia)', 'Rs 120'], ['Sockets', 'Rs 150'], ['Extension Cord 3m', 'Rs 600'], ['Extension Cord 5m', 'Rs 900'], ['Multi Plug', 'Rs 350'], ['LED Bulb 9W', 'Rs 200'], ['LED Bulb 18W', 'Rs 350'], ['LED Panel Light', 'Rs 1,200'], ['Tube Light (LED)', 'Rs 500'], ['Energy Saver', 'Rs 400'], ['Wire (Per Meter)', 'Rs 30'], ['Tape (Electrical)', 'Rs 100'], ['Fuses & MCBs', 'Rs 250'], ['Doorbell', 'Rs 800']
    ]},
    computer: { icon: '💻', name: 'Computer Accessories', items: [
      ['Wireless Keyboard', 'Rs 2,000'], ['Wired Keyboard', 'Rs 800'], ['Wireless Mouse', 'Rs 1,500'], ['Wired Mouse', 'Rs 500'], ['USB Hub 4 Port', 'Rs 600'], ['USB Flash Drive 32GB', 'Rs 1,200'], ['USB Flash Drive 64GB', 'Rs 2,000'], ['External HDD 1TB', 'Rs 8,000'], ['External HDD 2TB', 'Rs 12,000'], ['Computer Speakers', 'Rs 2,500'], ['Webcam HD', 'Rs 3,000'], ['Laptop Stand', 'Rs 2,000'], ['Laptop Bag', 'Rs 1,800'], ['Cooling Pad', 'Rs 2,500']
    ]},
    cooling: { icon: '🌀', name: 'Cooling & Heating', items: [
      ['Pedestal Fan (Local)', 'Rs 4,500'], ['Pedestal Fan (Imported)', 'Rs 7,000'], ['Ceiling Fan', 'Rs 5,500'], ['Exhaust Fan', 'Rs 3,000'], ['Room Heater (Small)', 'Rs 3,500'], ['Room Heater (Large)', 'Rs 6,000'], ['Oil Heater', 'Rs 8,000'], ['Air Cooler (Desert)', 'Rs 15,000'], ['Air Cooler (Tower)', 'Rs 22,000'], ['Fan Regulator', 'Rs 400']
    ]},
    repair: { icon: '🔧', name: 'Repair Services', items: [
      ['Mobile Screen Replacement', 'Starts Rs 1,500'], ['Mobile Battery Replacement', 'Starts Rs 800'], ['Charging Port Repair', 'Starts Rs 500'], ['Mobile Software Issue', 'Starts Rs 500'], ['LED TV Repair', 'Starts Rs 1,000'], ['Fan/Motor Repair', 'Starts Rs 300'], ['Microwave Repair', 'Starts Rs 800'], ['Iron Repair', 'Starts Rs 400'], ['Computer/Laptop Repair', 'Starts Rs 1,000'], ['UPS/Inverter Repair', 'Starts Rs 1,500'], ['Free Inspection', 'Free']
    ]}
  };

  let currentCat = 'appliances';
  const section = document.getElementById('menuSection');

  function renderCategory(cat) {
    const data = menuData[cat];
    if (!data) return;
    currentCat = cat;

    let html = `<div class="cat-header"><span>${data.icon}</span><h2>${data.name}</h2><span class="count">${data.items.length} items</span></div><div class="menu-items">`;
    data.items.forEach(item => {
      html += `<div class="menu-item"><span class="name">${item[0]}</span><span class="dots"></span><span class="price">${item[1]}</span>`;
      if (item[2]) html += `<span class="desc">${item[2]}</span>`;
      html += `</div>`;
    });
    html += `</div>`;
    section.innerHTML = html;
  }

  renderCategory('appliances');

  document.querySelectorAll('.menu-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const cat = tab.dataset.cat;
      if (cat !== currentCat) {
        document.querySelectorAll('.menu-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        section.innerHTML = '<div style="text-align:center;padding:3rem;color:rgba(255,255,255,0.2);font-size:0.9rem;"><div style="font-size:3rem;margin-bottom:1rem;opacity:0.3;">⚡</div>Loading...</div>';
        setTimeout(() => renderCategory(cat), 200);
      }
    });
  });
</script>
</body>
</html>
